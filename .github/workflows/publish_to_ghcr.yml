name: Docker publish to GHCR

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["lint and test flask app"]
        types:
            - completed

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Docker login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - name: build docker image
              run: docker build -t ghcr.io/quentindubos80270/linter-python-flask/monapp:latest .
            - name: Push docker image to GHCR
              run: docker push ghcr.io/quentindubos80270/linter-python-flask/monapp:latest